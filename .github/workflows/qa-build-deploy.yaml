name: QA build and deploy of bkeXtest services
on:
  push:
    branches:
      qa
env:
  QBKEI_KUBECONF: ${{ secrets.QBKEI_KUBECONF }}
  QBKED_KUBECONF: ${{ secrets.QBKED_KUBECONF }}
  QA_XTEST_ROBOT: ${{ secrets.QA_XTEST_ROBOT }}

jobs:
  Building_and_Deploying_bkeXtest:
    runs-on: [self-hosted, qa-ghrunner]
    steps:
      -
        name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      -
        name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@111c56156bcc6918c056dbef52164cfa583dc549
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      -
        name: Get kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8
        with:
          version: v1.30.0
      -
        name: pull kubeconfig
        run: |
          mkdir secrets
          touch secrets/qa-bkei.yaml
          touch secrets/qa-bked.yaml
          touch secrets/robot-qa.txt
          echo "$QBKEI_KUBECONF" > secrets/qa-bkei.yaml
          echo "$QBKED_KUBECONF" > secrets/qa-bked.yaml
          echo "$QA_XTEST_ROBOT" > secrets/robot-qa.txt
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          install: true
      -
        name: Build
        run: make build
      -
        name: Push
        run: make push.qa
      -
        name: Delete
        run: make delete.qa
      -
        name: Deploy
        run: make deploy.qa