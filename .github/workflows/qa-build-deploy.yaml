name: QA build and deploy of bkeXtest services
on:
  push:
    branches:
      qa

jobs:
  Building_and_Deploying_bkeXtest:
    runs-on: [self-hosted, qa-ghrunner]
    steps:
      -
        name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - 
        name: Load secrets
        id: op-load-secret
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 #v4.0.0
        with:
          export-env: true
        env:
          OP_CONNECT_HOST: secretsvault.apps.brown.edu
          OP_CONNECT_TOKEN: ${{ secrets.VO_AUTOMATION_CONNECT_TOKEN }}
          QA-BKEI: op://ozxznermh2dq4gbh55do65oq7e/x6xih2sdzstjcwna4xnhfwyqru/qa-bkei.yaml
          QA-BKED: op://ozxznermh2dq4gbh55do65oq7e/fslejjfdbkkor2cpn7kfxa2hua/qa-bked.yaml
          ROBOT-QA: op://ozxznermh2dq4gbh55do65oq7e/d3thgre3wspmoxld6mlazplnhy/credential
      -
        name: Get kubectl
        uses: azure/setup-kubectl@901a10e89ea615cf61f57ac05cecdf23e7de06d8 # v3.2.0
        with:
          version: v1.32.0
      -
        name: pull kubeconfig
        run: |
          mkdir secrets
          touch secrets/qa-bkei.yaml
          touch secrets/qa-bked.yaml
          touch secrets/robot-qa.txt
          echo "$QA-BKEI" > secrets/qa-bkei.yaml
          echo "$QA-BKED" > secrets/qa-bked.yaml
          echo "$ROBOT-QA" > secrets/robot-qa.txt
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.0.0
        with:
          install: true
      -
        name: Build
        run: make build
      -
        name: Push
        run: make push.qa
      -
        name: Delete
        run: make delete.qa
      -
        name: Deploy
        run: make deploy.qa