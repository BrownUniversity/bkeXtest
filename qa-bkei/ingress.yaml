apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bkextest
  annotations:
    cert-manager.io/cluster-issuer: "bke-ci-eab"

spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - qbkeitest.virtorch.brown.edu
    secretName: qbkeitest-tls
  rules:
  - host: qbkeitest.virtorch.brown.edu
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: bkextest
            port: 
              number: 8080
